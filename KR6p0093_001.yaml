body:
  text: 菩薩苾蒭行䇿截流勸發真信念佛三昧其來尚矣自遠祖崛起廬山肇興蓮社六時淨行遂成千古芳規雖曰功高易進乃末世行人罕獲靈驗良由信願不專未能導其善行以要歸淨土故也今既廣邀善侶同修淨因若非諦審發心那知出苦要道凡我同人與斯法會者須具真實信心苟無真信雖念佛持齋放生修福祇是世間善人報生善處受樂當受樂時即造業既造業已必墮苦正眼觀之較他一闡提旃陀羅輩僅差一間耳如是信心豈為真實所謂真信者第一要信得心佛眾生三無差別我是未成之佛彌陀是已成之佛覺性無二我雖昏迷倒惑覺性未曾失我雖積劫輪轉覺性未曾動故曰莫輕未悟一念回光便同本得也次要信得我是理性佛名字佛彌陀是究竟佛性雖無二位乃天淵若不專念彼佛求生彼國必至隨業流轉受苦無量所謂法身流轉五道不名為佛名為眾生矣次要信得我雖障深業重久居苦域是彌陀心內之眾生彌陀雖萬德莊嚴遠在十萬億剎之外是我心內之佛既是心性無二自然感應道交我之苦切必能感佛之慈悲必能應如磁石吸鐵無可疑者所謂佛念眾生如母憶子子若憶母如母憶時母子歷生不相違遠若眾生心憶佛念佛現前當來必定見佛去佛不遠也具如上真信者雖一毫之善一塵之福皆可迴向西方莊嚴淨土何況持齋秉戒放生布施讀誦大乘供養三寶種種善行豈不足充淨土資糧唯其信處不真遂乃淪於有漏故今修行別無要術但於二六時中加此三種真信則一切行履無煩改轍矣倘欲捨此度門別商元妙工夫則諸方宗匠如林剎竿相望正可隨處問津不須投足茲社若果名心永盡素願攸同時節因緣幸常集會依稀蓮漏仿佛籃輿今古如斯遺風未泯庶他生為親近之津梁即此世為助發之資具願交勉焉申勸昔真歇和尚云佛佛授手祖祖相傳惟此一事更無餘事釋迦老子住世七十九年說法三百餘會獨於淨土之教諄諄讚說而不已得非以是為超凡入聖之捷徑乎然此法門誠易誠難夫執持名號修眾福善至心迴向即得往生苟得往生則橫截五道頓超三有直階不退不歷多祇豈非簡易倘若娑婆事業在在縈懷一暴十寒心不專篤遇五欲時如膠如漆遭逢逆境結怨銜恨而欲命終彼佛接引又必不可得之數豈非難事由此觀之淨土法門藥也娑婆貪愛忌也眾生業病教奉醫王甫服其藥復飽食其忌可乎及乎臨欲命終重處偏墜淨因微弱難脫苦輪翻謂醫王誤人佛法無驗悲夫若輩顛倒極矣曷不思匡廬法社十八高賢暨百二十三人俱留瑞應具載方䇿古今日月古今山河彼既丈夫我豈不爾當知不爾者祇是重處放捨不下故也凡我同會緇白老壯宜各痛念娑婆險惡早求出離六道之匍匐九品之逍遙利害天淵大須猛省必也生大欣厭捨穢取淨信此取捨與不取捨原非異轍毋騖虗名毋執空見毋受高帽禪和口頭三昧惑亂毋求旦夕速效妄冀心外有佛來迎動諸魔事不論居家時入社時恒以念佛為正行以勉修眾善為助行更於貪瞋習氣刻意揩磨使重處得輕生處漸熟淨念相繼願行相資自然千穩百當也其眾行之中則放生一事為最善但應諦思彼雖同性猶屬異類尚須救之況我同類之人障深業重有不久墮入惡趣者有現在地獄受苦者彼地獄苦劇於世間刀火奚啻十百千倍何容於此置之膜外不圖拯救然其拯救之法亦惟在今日一心念佛以速生安養然後乘本願輪運大神力興無緣慈擴同體悲分身散影於十方剎土諸惡趣中尋聲救苦如觀世音菩薩誓空地獄如地藏王菩薩拔一切眾生苦因苦果與一切眾生世出世樂攝一切眾生同覲彌陀慈父到究竟安隱處具如是志願方是丈夫漢若不具如是志願則屆期聚首悠悠從事雖念佛放生亦只是尋常社會豈曰無福非衲所望於諸上善友也幸審擇之又申勸淨土法門雖諸佛諸祖共所讚揚然當世士夫一代時教曾未經目苟非宿有靈根焉得聞而深信今為略舉一二大經要論以概其餘使知法門殊勝易生信樂之心祇如華嚴一經教門廣大為諸經中王譬如杲日當空掩眾星之彩須彌橫海落羣峰之高其語世界也不曰恒河沙數而曰不可說不可說佛剎極微塵數普賢菩薩以智通力一眼普觀無邊香水海無邊剎土如掌中果從近至遠隨其方面一一指陳名號相狀極樂世界在毗盧遮那本剎中剎有二十層上廣下狹形如倒卓浮圖娑婆與極樂同在第十三層此層內有十三佛剎微塵數世界圍繞極樂世界其一數耳視本剎世界之多猶如盡贍部洲百歲所收之穀總為一聚其中一粟相似何況更視本剎外無邊剎種所有世界尚可以言思計議哉如是廣大經文於末後結束處乃以十大願王導歸極樂惟令生安養世界惟願見阿彌陀佛其專切勸發反復丁甯具在行願品中茲不繁錄又佛滅後六百年西天第十二祖馬鳴大士應佛懸記重興正法宗一百洛叉大乘經典造為一論名曰起信能令末世眾生發起大乘正信譬如錯眾采而為錦釀百華而成蜜其建言析理窮微造極既備陳一切法門種種三昧令修習正信已復念一切法門種種三昧皆難修而易退乃於末後更示諸佛勝異方便曰復次初學菩薩住此娑婆世界或值寒熱風雨不時饑饉等苦或見不善可畏眾生三毒所纏習行惡法菩薩在中心生怯弱恐不能成就清淨信心生疑欲退者應發誓願一心專念佛及菩薩以生決定心故於此命終必得往生諸佛剎中見佛菩薩永離惡趣如經中說善男子善女人專念西方極樂世界阿彌陀佛以諸善根回向願生決定得生常見彼佛信心增長永不退轉得入正位是知佛世時文殊普賢佛滅後馬鳴龍樹如是諸大士咸勸往生兼願自往親近彌陀他如寶積大集等諸大部經中稱揚讚勸未易悉舉然十方諸佛淨土無量經論偏指歸極樂者略有三意一為彼佛與此土人最有緣故無貴賤無賢愚無幼艾皆知阿彌陀佛號若有苦屈啟口發聲無不稱其名者二為法藏比丘願力勝故攝二十一億清淨佛土諸莊嚴事總為極樂世界一剎莊嚴發四十八宏誓願廣接十方念佛眾生來生其國葢諸佛果德雖實平等因中願力任運攝生無差別中有差別故三為阿彌陀佛即法界藏身極樂世界即蓮華藏海見一佛即是見無量佛生一剎即是生無量剎念一佛即是念一切佛即為一切佛所護念以法身不二故生佛不二故能念所念不二故也然諸經論雖廣讚揚此國眾生初無知者唯晉遠公崛起匡廬肇興蓮社一時名賢巨儒不期自至如劉遺民及宗雷等皆服膺請教道遂大振繼自唐宋以來禪學寖盛士大夫有智識者多雅慕宗門趣尚高異然上下千百年間其真能見性者不過楊億侍郎李遵勗駙馬及許式郎中輩數人而已餘皆游戲門庭者耳遂令不思議勝異法門委為愚夫愚婦句當中間雖有三五尊宿遞相祖述然未必多接高流廣度羣品延及明季乃有雲棲宏大師出承宿悲願以醇儒脫俗專宏淨業當世名賢歸信者固多疑毀駁難者亦復不少大師以宏才妙辯百戰不屈翻成法喜之樂由是緇素悅服幾如遠公復生永明再世淨土之道復得大振是則起千餘年已墜之法門厥功不既偉與烏呼乃今往矣末法昏衢眾生垢重險惡道中失此良導可不為長太息者哉予生也晚弗獲親炙大師寶其遺言奚啻珪璧每一展讀其書輒不禁涕泗橫流心意勇發今住茲普仁以來常得羣賢聚首六時行道洽我素心然每遇一友與會不敢以俗士目之私心竊計曰蓮華國土中復增一勝侶矣昔我釋迦本師懸記此土有六十七億菩薩往生彼國此必一數也雖知悠悠退墮者多然既發意念佛已入彌陀願海如人食少金剛終竟不消縱勤惰遲速不同究竟必生彼國既生彼國究竟必獲果證八相成道廣度眾生故今於甫入會時即以未來諸佛相期待非為虗妄也但不識眾友自待何如苟能如衲所期待以自期待則凡現前善友皆吾蓮蘂連枝矣然吾觀今之富貴利達者或貪粗敝聲色不知苦本或著蝸角勳名不悟虗幻或復愛殖貨利會計經營現在碌碌一生將來隨業流轉彼佛剎中依正莊嚴無量勝妙樂事不聞不知從生至死未曾發一念向往之心反不如窮愚困厄之夫多能念佛從冥入明轉生勝處也故今敬勸諸友既各標名蓮社便是火宅優曇必也具真實願發忻厭心視三界如牢獄視家園如桎梏視聲色如鴆毒視名利如韁鎖視數十年窮通際遇如同昨夢視娑婆一期報命如在逆旅信宿捨離惟以歸家為務如意亦得不如意亦得捨得寸陰一心念佛果能如是若不生淨土者諸佛皆成誑語矣願共勉之起三年長期示眾凡欲與期念佛令功行不虗者當發三種心以為方便第一發痛惜光陰心雖約三年光陰無幾古人喻如連日瘧發三度寒熱期即告終若非勤䇿身心寸陰是競未免見以為長若見以為長則悠悠歲月罔罔襟懷疲厭易生淨功莫剋豈不大可惜哉況命在呼吸安保三年縱越三年豈能長久所謂如囚趣市如羊詣屠但得前行步步近死直須孜孜晝夜矻矻暑寒一句洪名無時間歇不用彌陀接引淨土決定可生凡我同行慎勿銳始怠終當視三年如一日如一剎那可也第二發專求出離心夫此三年功行非但不求世間福報亦并不求功德智慧辯才悟解與夫世世為僧興顯佛法等願惟願命終得生彼國脫生死苦此願直須刻刻現前如昔人被覆在千尺枯井中受野狐訣注視磨孔一心欲出視之既久孔不加大身不加小任運飛出念佛亦爾專念彼佛一心求生念之既切佛實不來我實不去自然得生得此一願則見佛聞法斷惑證果不假方便自得心開百千三昧應念現前不可說不可說微塵數大願同時具足所貴諦信力行惟專惟一始克有濟也第三發和順守約心堂中既無多眾早晚共住稱同行善知識各宜防身護口謙恭巽順互相砥礪互為標榜此三年內例如掩關禁足當以山門為界不得出外行走雖親友病亡大故亦不得破例而出開他人效尤自便之端每日恒課不得懈怠廢缺惟除病患不能飲食然或坐或臥亦須默默念佛葢病患中尤當急切也恒課外有餘須自檢點勿放身心空過不得閒談雜話放逸戲笑誤己妨人更不得披覽外書吟咏詩偈非唯唐喪光陰亦乃孤負檀越本堂輪一人作監直五日一換挂牌交代有不守約不如法者監直師即應勸諫一諫輒聽者善若三諫不聽者白眾議罰若監直師狥情容隱不諫不舉者隨事量罰若諸師自嚴自重各精進不放逸置規約於無用之地則彌善也勉旃勉旃起精進七期示眾七日持名貴在一心不亂無間無雜非必以快念多念為勝也但不緩不急密密持名使心中佛號歷歷分明著衣喫飯行住坐臥一句洪名緜密不斷猶如呼吸相似既不散亂亦不沈沒如是持名可謂事上能一心精進者矣若是真正道流直能體究萬法皆如無有二相所謂生佛不二自他不二因果不二依正不二淨穢不二苦樂不二忻厭不二取捨不二菩提煩惱不二生死涅槃不二是諸二法皆同一相一道清淨不用勉強差排但自如實體究體究之極與自本心忽然契合方知著衣喫飯總是三昧嬉笑怒罵無非佛事一心亂心終成戲論二六時中毫髮許異相不可得雖則至心偁念亦同肆口訶罵雖則精進修持亦是夢中苦行如是了達方是真正學道人一心精進持名也前一心似難而易後一心似易而難但能前一心者往生可必兼能後一心者上品可階然此兩種一心皆是博地凡夫邊事凡有心者皆可修學同堂緇素切勿高推聖境甘處下劣各須勤䇿身心近則七日內遠則一生中常作如是信常修如是行縱不證剋為因亦強華宮託品必不在中下矣倘或七日之後置若罔聞熟處畢竟不生生處依然難熟無明業習牽合交纏僅欲邀功七日而此七日又未曾到一心不亂田地正所謂少善根福德因緣安望往生彼國致令金口誠言翻疑誑妄是誰之咎乎同七淨眾願各自審而誡勉之料柬法門念佛求生淨土釋尊於無量法門中特垂勝異方便然念佛一法仍有多門約而計之不出四種一者念佛實相即本覺理性如大集等經所明是也二者念佛法門即種種三昧如諸大乘經所明是也三者念佛相好即勝劣身相如十六觀經所明是也此三種念佛勝則勝矣非異方便葢必洞明事理深達境觀上智猶難鈍根絕分故也四者念佛名號即一心持名如小本阿彌陀經所明是也惟此一門藉彼佛勝願力故不論有智無智上中下根但執持名號一心不亂七日乃至一日即是多善根福德因緣即蒙彌陀聖眾接引即為十方一切諸佛護念又彼佛本誓若有眾生欲生我國至心信樂乃至十念若不生者不取正覺是為不思議異方便惟其異故勝也所生淨土亦有四種一曰常寂光土極果聖人所居斷無明惑盡方得生二曰實報無障礙土別圓地住以上菩薩所居斷塵沙惑方得生三曰方便有餘土四果聖人及別教三賢菩薩圓教十信菩薩所居斷見思惑方得生此三種淨土勝則勝矣非異方便葢必斷惑乃生還同豎出三界故也四曰凡聖同居土權實聖賢與博地凡夫共居惟此淨土仗諸佛攝受力故不須斷惑兼復帶業往生但惟信願前導感應道交濁障稍輕苦輪斯脫而又即此同居安養豎徹方便實報寂光故上智即能頓淨四土而下愚亦可三界橫超無煩九次第修不俟三僧祇證是為不思議異方便惟其異故勝也如此最勝獨異法門釋迦善逝殷勤示勸於五竺遐恒沙如來廣舌讚揚於十方剎土豈欺我哉龍樹毗婆沙論云佛法有無量門如世間行路有難有易徒步則難乘船則易欲易行疾至應當念佛稱阿彌陀佛名號疾得阿耨菩提又智者十疑論云在五濁惡世求阿毗跋致甚難可得譬如跛人步行一日不過數里若信念佛三昧乘彼佛願力攝持決定往生如乘船遇順風須臾千里又如劣夫從轉輪王一日一夜周行四天下非是自力輪王力也乃世之駕言直指者多以西方為鈍置謂此法門專攝鈍根劣器耳苟能一超直入何假他力不思文殊普賢馬鳴龍樹及此土智者智覺咸發願往生盡屬鈍根乎世尊於寶積會上勸父王淨飯并六萬釋種皆生淨土盡是劣器乎不假方便自得心開安有如斯曲徑甫育蓮胎便階不退奈何反屬廉纖若夫已悟心宗為垂警䇿猶曰生生不退佛階可期者其難易遲速皎然可知矣而世之學者或疑或謗或恥談而不屑道雖曰非愚非狂吾不信也九品略辯淨土一門雖廣攝諸根咸登不退而見佛久近聞法大小證果授記遲速不啻天淵懸絕大本經略分三輩不及觀經九品為詳總而論之上品以解悟為本中品以戒善為本下品純惡無善惟臨終遇善友一念信心滅罪往生析而計之上上生者所謂讀誦大乘則宗說俱通修行六念則行解相應故彈指即生見佛聞法悟無生忍須臾歷事十方諸佛親蒙授記僧如遠公智者俗如劉遺民楊無為輩足以當之上中生者雖未及讀誦大乘而能解第一義是於己躬亦有悟入而行證未逮上上生者故經宿華開見佛因前宿習普聞眾聲皆說甚深第一義諦七日於阿耨菩提得不退轉修諸三昧經一小劫得無生忍上下生者雖未有悟入而亦發無上道心自欲明見本性卒未遂志以求生者七日見佛三七日始聞妙法經三小劫住歡喜地中上生者乃在家淨信男女持戒求生者臨終見佛往生蓮華尋開聞說四諦應時即得阿羅漢道以戒力專故華開證果甚速以未發無上道心故所聞但四諦所證但小果耳中中生者乃出家男女持戒求生者曰一日一夜持沙彌戒持具足戒者顯戒法殊勝雖最促猶生何況久持然出家戒行精專亦生中上在家暫持齋戒亦生中中可互通也臨終見佛往生七日華開聞法得須陀洹果經半劫成阿羅漢中下生者亦在俗男女素未歸向三寶而天資仁孝進道有階臨終遇善知識開示即獲往生七日見二大菩薩聞法得須陀洹果過十小劫成阿羅漢下上生者乃在俗惡人臨終遇善知識教稱佛名滅罪往生七日華開見二大士說甚深十二部經發無上道心經十小劫得入初地下中生者乃出家破戒惡人臨終遇善知識稱佛說法一念往生六劫華開見二大士聞大乘甚深經典發無上道心下下生者五逆十惡極惡之輩兼僧俗二類臨終遇善知識教稱佛名十念往生十二劫華開二大士為說諸法實相即發菩提之心後二生未言登地時數者亦如下上生發無上道心後十小劫也中三品雖以戒善求生自度心堅度他行缺故終得大乘而須暫登小果下三品雖係極惡凡夫以聞二大士說甚深法即能發無上心雖經多劫直入聖位然則一念大小頓越權乘小果一生精進遠超多劫華胎大小遲速之間發心䇿行者當審所從事矣悟後求生者藉極樂境緣結習易斷三昧易修速成忍力度諸眾生也未悟求生者為親近彌陀易於見性永明所謂但見阿彌陀何愁不開悟是也禪淨二門各宜專務不必兼修但彼此相非深昧佛旨參禪者無論悟與未悟但獲往生皆躋上品修淨者雖五逆十惡懺悔猶預下生而必曰不謗大乘則謗者不生可知矣先悟後生者如巨帆遇彼順風念佛謗禪者如敗種植乎腴壤其優劣之相得失之關誠不可不辯也示夏子彝居士大阿彌陀經云娑婆世界修行一晝夜勝于極樂世界行善百歲葢以此土難於進修彼土易為功力故也例此而言則風塵世路中修行一日勝于深山淨剎修行百千日無疑矣是故帝鄉可遊也紅塵可入也所謂淨願不可忘也淨行不可缺也嗟乎風塵亦何能染人第恐人自染風塵耳居士善根深厚信力專篤久知選官不如選佛此行葢非得已也然選佛場開是處可入無論深山淨剎世路風塵要須心作南車願為前導苟所向不乖雖終日途中何異家舍長安此地不隔一塵隨伊冒暑衝寒經州歷縣操觚捉筆執轡揚鞭處處道場時時佛事淨願淨行常得現前自然達清泰之上面無量之壽聖預九品之科目極住行向地之升進候十方諸佛息化之大闕然後分身補處發號施令統理九法界人天調熟七方便弟子如是選官選佛豈不誠大丈夫哉然而說則易行則難深山淨剎則易風塵世路則難吾願居士為其難者則他時異日必有大得力處當念流光如駛衰老日侵長途往還勿虗度好時節定課外有餘但只加持佛號若楞嚴呪大悲呪等客路俱不必也示丁耕野居士昔寂室和尚云世人欲修淨業不可言我今忙迫且待閒暇我今貧乏且待富足我今少壯且待老時若分定常忙分定貧乏分定夭折即於淨業無緣修習忽爾喪亡雖悔何及何如趁身彊健努力修之至哉言乎然今人無論信樂者少縱能深信淨土而因循需待蹉過一生者比比皆是也居士天姿醕謹向見衲不久即能警悟無常長齋事佛葢宿緣有在也然居士家無恒產歲以館穫得糈夫家無恒產則不足可知矣身有館職則不閒可知矣年方半百則未至衰老可知矣乃一旦謝館不赴却諸門弟子秉持滿分優婆塞戒楗戶終年專力淨業至於資糧薪水初無會計非勇猛丈夫而能若是乎且以斗室狹隘半供經像于中避囂息影銳意精修一如夏屋寬舒泰然自足惟慮其不能久久如斯也嗟乎夫人之居世亦何定哉竊嘗論之暇莫暇于不失時富莫富于常知足強莫強于勤精進今居士兼三者而有焉則雖舉天下之閒者富者強有力者與居士較吾知其有名而無義矣能如是于生淨土也何有然更有一語願相告誡者譬如萬斛之舟欲有所往檣非不高也柁非不正也資具非不完備也去志非不決也乘風張帆有瞬息千里之勢倘若船頭一樁未肎却被一條纜索繫住雖種種推排其能有濟乎今時淨業人終日念佛懺罪發願而西方尚遙往生弗保者無他愛樁未情纜猶牢故也若能將娑婆恩愛視同嚼蠟不管忙閒動靜苦樂憂喜靠著一句佛號如須彌山相似一切境緣無能搖動或時自覺疲懈惑習現前便奮起一念如倚天長劒使煩惱魔軍逃竄無地亦如紅爐猛火使無始情識銷鑠無餘此人雖現處五濁之鄉已渾身坐在蓮華國裏又何待彌陀授手觀音勸駕而始信其往生哉或曰彼居士勇猛精進如是豈復牽于情愛不幾于無病而授藥乎予曰不然古人云愛不重不生娑婆又云道念若同情念則成佛多時五通仙人累劫精勤尚以欲漏未除隳其功行故知未登聖果以還鮮有不被其繫累者居士果世念輕微道心勇銳見欲避如火阬憶佛如戀慈母淨齋清課永矢弗渝又何妨以無病好人常服良藥豈不起居輕利轉益強健乎總之煩惱無盡而生死根本則唯貪愛能漂溺行人障往生法是故先佛經中處處訶責但情愛一分疏淡則淨業一分成熟于生死岸頭庶得解脫也居士其勉之哉柬顧兆禎居士末法澆漓人趨詐偽求其履道存誠敦古反樸如我老居士者其人皆不啻披星揀月矣然淨友中得君家公臣又得丁君耕野復得翁君舜儀皆屬居士令親何祥麟瑞鳳之以類而聚耶就中翁君大孝遺身所謂難行苦行我所未曾為亦所不能為心焉欽服非復筆舌所可讚述讀長歌允稱其人三復再復彌見精麗昔也知章八十耽吟邱為九旬工賦居士年居邱賀之間而著作亦兼擅其美所冀惜分寸之陰淡筆墨之好回此精力唯以淨業棲心則慧芽增長道種成熟異日佛前蓮華化生便非邱賀輩所可同年語矣答顧兆禎居士前有數行奉寄想已塵覧頃接手書乃有塵業情緣卒難銷隕何時得成妙觀等語足知求道之切然依鄙見即此厭塵情忻妙觀正坐學道內障且避諠求靜處世未有其方塵情果可絕乎要知萬法本閒惟人自鬧善乎蕅益大師之言曰雖曰六根幻馳六情紛動仔細推求塵既不居其咎根亦豈職其愆根既不職其愆情豈獨當其罪三科剖析既無真主縱使共合那有實法而我輩於此虗妄法中著我耽人舍彼取此猶如揑目亂華發生更欲分別華相孰妍孰醜不亦謬乎唯將身心世界全體放下則智眼昭明何處有塵情可厭然欲念佛求生淨土正不妨熾然起忻厭心此忻厭心著之則成惑病了之則是方便亦存乎其人耳所言妙觀者觀經不云乎諸佛正徧知海從心想生眾生心想佛時是心即是三十二相八十種好是心作佛是心是佛只此數語便是念佛三昧祕要一切觀門無不從茲流出葢知作而不知是則墮在權小知是而不知作必落魔外作即空假觀是即中道觀全是而作全作而是作是一念三觀圓融故大集經偈云若人但念彌陀佛是名無上深妙禪至心想像見佛時即是不生不滅法智覺禪師云一念相應一念佛念念相應念念佛佛是本覺之理念即始覺之智故知正念佛時始本會合理智冥契能所俱忘自他不二無念外之佛為念所念無佛外之念能念於佛超情越見離句絕非直捷圓頓無過此者除却念佛外豈別有妙觀可成耶竊嘗論之藥無貴賤起病為良治本治標宜隨緩急居士以耄期之年回心向道縱得百齡餘光有幾可不思束其功於至穩至易之途而尚似探元問妙徘徊跂望於其間乎衲前晤時非唯不譚妙觀并為略去多種日課僅以六字真言相勸勉者此是海上奇方能療急病抑又標本齊治緩急咸宜貴在深信力行古人所謂但見阿彌陀何愁不開悟然則何塵情而不銷隕何三昧而不現前然在今日縱有百千法門無量妙義總置不用唯此一味單方相贈苟非斬釘截鐵併力專持其何以自振拔哉若必謂持名功效不及用觀者則彼佛所具身相微妙經論所開觀法深細博地初心恐不易成辦終不若依小經專一持名為穩當耳但持名時了達事理一心不亂即是觀境不須別求元妙念老居士十分誠慤忘年齒之高殷殷下問故敢罄布愚直之私而一無諱忌也惟審之擇之何如名字說與金水若居士天台以六佛揀濫初曰理性次曰名字始聞聖教乃至明心見性皆未出名字位故知名字其時甚長而其義亦甚深無量也居士名善字水若達此名識此字於見性成佛之道思過半矣告子曰性猶湍水也決諸東方則東流決諸西方則西流人性之無分於善不善也猶水之無分於東西也異哉告子之言性也雖非儒宗中至義乃翻有類乎如來之契經也惜其屈於孟子之辯而卒無以申明其說是亦如蟲禦木耳夫十法界本乎一心則善不善法皆性具明矣所謂性中有染淨種子故世出世間無有一法而能外乎性率性中淨種子而起現行則為君子之道謂之修善率性中染種子而起現行則為小人之道謂之修惡中庸曰率性之謂道孔子曰道二仁與不仁而已矣道無分於仁不仁即性無分於善不善也若性惟善而無不善則三塗惡趣非由心造又豈得稱為法界乎是故一闡提人雖斷修善不斷性善若斷性善則終不成佛諸佛聖人但斷修惡不斷性惡若斷性惡則不能現穢惡世界折伏眾生此性修之關所當洞達既不能離性以起修亦不得廢修而言性也請以水言之所謂性者即溼而就下東流西流者也所謂修者即決之東方決之西方者也居士欲修淨業可不顧名思義而審其所以修之之術乎若其心念念趣貪瞋癡日深月甚輓之不回引之不出發於身口多與惡相應則所謂決之東方終為震旦國中人物若其心念念厭離五欲繫想阿彌陀佛願樂親近如子憶母不為業境之所牽不為他岐之所惑則所謂決之西方定於極樂世界蓮華化生見佛受記由是觀之見性成佛亦在乎決之而已若能決之西方而為西流之水則必不入三塗鼎沸之水必不雜人天渴愛之水不混凡夫之濁水不沾魔外之惡水不墮二乘之死水不同權乘之客水常得理水以潤心田智水以融萬行即此名字位中而圓合如來之性水既得與性水合則會歸七寶池中為澄淨為清冷為甘美為輕輭為潤澤為安和為除患為增益而究竟成八功德之聖水矣西流而極於此真能盡水之性者與然吾審居士之名與字是從孟子義也非告子義也若夫決擇善法修習令滿決破不善法修除令盡則君子道長小人道消而終止於至善之地是未嘗不與告子合未嘗不與宣聖合亦未嘗不與西方之大聖人合也居士其力決之乎首楞嚴經勢至圓通章首楞嚴一經說在法華之後實為佛法堂奧昔智者判教時此經未來支那故唯以法華涅槃為後味若令一見必廣有疏釋且判屬醍醐無疑矣奈四依大士已滅古今疏主各興異見久如聚訟後學不具擇法眼靡所適從至欲盡廢疏解唯看經文亦過激之論也及乎以己智尋經又多不能達其旨趣則終於昧昧而已試平心論之眾解豈無長處然不失之乖謬即失之粗略間有智識高超出乎其類者則又借此經發揮匈中剏論有真能舍己從經曲順佛意則西湖鑑一疏之外吾未見其能竝美者孰謂今人必不能邁古耶或病其主張太過譏其杜撰不無縱未能無遺憾要亦大有功於此經者矣至於舍識用根歸重圓通之說則諸佛誠言誰敢不信此方教體誰敢不遵從而議之者皆違經抗佛者也現前諸善友既已標心淨土復欲研究此經甚不易得然始末無論只此圓通文中大有淆譌處若非善讀善會者則所謂醍醐毒藥亦不甚遠豈不聞楞嚴會上選佛場開觀音登科勢至下第修淨土人於此若不揀辨何以發此經之密意而堅後學之行願耶但勢至法門非此經要義故鑑師疏中亦引而不發今則先辨法門次彰密意辨法門者當知此聖圓通屬七大中根大以都攝六根故依此六根而修念佛三昧有三種不同一者念自佛二者念他佛三者念自他佛若念自佛則與諸聖圓通是同以根性為所念法門以旋湛為能念方便如央崛經云所謂彼眼根於諸如來常具足無減修了了分明見乃至彼意根於諸如來常具足無減修了了分明知等亦如此經十方諸佛同告阿難令汝速證安樂解脫寂靜妙常唯汝六根更非他物又如祖師云在胎名身處世為人在眼曰見在耳曰聞在鼻辨香在口談論在手執捉在足運奔識者知是佛性不識喚作精魂從上諸祖如斯指示甚多此念自佛三昧具攝一切教義一切禪宗直指法門罄無不盡也若念他佛則與諸聖圓通有異以六根為能念以果佛為所念法身雖復一體我無二種莊嚴諸佛福智圓滿成兩足尊念彼果德不生疲厭眼常瞻佛相耳常聞佛教鼻常觸佛香舌常稱佛號身常禮佛像意常緣佛法六根所注無非佛境如是相繼無間無雜此念他佛三昧具攝一切彌陀藥師彌勒上生等經及蓮社一切業行事想法門罄無不盡也若念自他佛則與諸聖圓通同而復異先須開圓頓解了知生佛一如心土不二託彼依正顯我心性既不迷性外有佛亦不執彼土非心此則開圓解處與諸聖同託他境處與諸聖異十六觀經所謂勝異方便今文謂不假方便自得心開以此方便最勝極異故不更假餘方便也祇就圓頓教中三種念佛三昧對四種淨土略辨攝生大用惟念自佛者攝歸實報寂光二種淨土然但能豎入不能橫超又但被利根不能普攝又則諸聖所同不顯此門獨異似非勢至攝歸本旨今謂正攝念他佛及念自他佛二種行人歸于同居淨土兼復橫超方便實報寂光是故文中深明感應道交之益也次顯經密意者選擇圓通法門猶如國家用兵選將相似或推作先鋒或壓令殿後殿後者為正選餘則各隨常隊而已其推與壓要非無故而然祇如十八界中必先根次塵後識此常例也今以六塵居先而根次之六塵中必先色次聲以及香味觸法今以聲最居先而色次之於六根中僅列其五抽出耳根置于二十四門之後葢以此方真教體清淨在音聞故以音塵開先聞根殿後而獨詳明之也雖不顯言其故人已覺之既歸重耳門一經要旨排列圓通法應如是然念佛法門亦逗此方機宜末世眾生須依念佛得度乃此經方令一門深入直了自性若復雙選二門則昧本經旨趣若令念佛法門直爾混依常隊又失他經廣讚之意故今巧示推壓如軍中密令未許泄漏葢前於十八界中明抽耳根為重將矣今乃於七大中暗壓根大為重將而此根大正屬念佛法門既不違他經廣讚之宗仍不乖此經用根之義可謂至巧亦至密矣夫七大次第曰地水火風空見識見即是根本應根先識後今移識居第六而以根大殿後亦如十八界中之耳門也又於前五大中推火大作先鋒而以地水風空次之此有兩意一為當機墮婬起教故以多婬召火警多聞人先除欲漏也故文云說多婬人成猛火聚乃至化多婬心成智慧火諸佛呼我名為火頭我以火光三昧力故成阿羅漢願為力士親伏魔怨等明以警之也一切經律中皆以不殺為首戒此經則以不婬為第一決定明誨於三緣中亦以欲貪先於殺盜均此意耳二為末世對治重障以煩惱雖多惟婬欲為生死根本最能障往生法故令行人觀凡夫身內婬火即如來藏性空真火循業發現深觀得悟成智慧光非唯不障往生且能將送行人託上上品所以淨名讚婬怒癡以其體即藏性而染淨功用在反掌間耳故以火頭居先亦如十八界中之陳那也今請歷觀諸聖除此二先鋒二重將外餘皆一依常例次第不紊可見二十五聖起座之時諸大弟子結集之際一威一儀一起一止皆有深意悉符教義以粗心遇之又安可得耶然則觀音雖獨登科勢至豈全下第但於觀音則明選於勢至則暗選耳良以圓根別入故明選諸根總攝故暗選此方教體故明選此土有緣故暗選通益當機時會現未眾生故明選別益惡世法末時不見佛眾生故暗選虎榜高題處人所共知朱衣暗點時人所不覺故曰大有淆譌須善讀善會也或曰既是密意何得泄漏曰楞嚴選佛場中揭榜已二千餘年矣此時若不明破密將焉用或又曰誠如子言則文殊說偈選擇時豈亦不知密意何不遵前例一概都揀耶曰諸聖自陳各說第一故寄推壓巧示密機若承敕正選時一依前軌何得成密然但聲塵火大準歸常次以此二門別意助顯非本所歸重故不更推出至於勢至法門仍順長行置識大後為二十四門之殿未始不遵也且既令專選一門何得不揀勢至觀其揀辭仍與諸聖不同但曰因果今殊感云何獲圓通意謂彼雖都攝六根淨念相繼而此相繼之念既屬行薀遷流亦生滅法以此為因欲往生見佛誰曰不可今欲現證不生滅圓通則因果不符何能克獲此揀現獲圓通為難非揀往生後益也其餘諸聖單念自佛唯屬現修現證故揀則全揀以不逗此土機宜不合此方教體故也有志修證者亦可以深長思矣然此為信力未堅者說若果深信淨土縱令楞嚴獨貶勢至亦自不疑何以故以他經廣讚故曰不可思議功德曰世間難信之法曰一切佛護念曰無上深妙禪曰勝異方便曰三昧中王多處極讚既不生信一處乍貶何輒生疑而況曾不獨貶而況復示暗選乎奈末世眾生讀此經者既不能依教從耳門深入現證圓通偏於念佛法門好起疑惑乃至破他淨信障他善行薄福少智人往往習氣如是故茲約法依經曲為辯析不自知其辭之叢沓也豈得已哉旅三字說妙法華經云三界無安猶如火宅若貪著生愛則為所燒故先佛世尊方便勸諭引之令出以此宅中眾苦充滿難可安居也蕅益大師淨信集云自寂光真性翳於五住塵勞而一切含識鮮有恒居雖四禪四空及方便土亦屬旅泊旅之時義大矣哉夫旅者以行旅之人次於旅舍之謂也旅必有伴亦必有處亦必有其本業今曠觀三界之中同一旅也而人異其業業本既異而處與伴亦殊焉慨自有識以來經塵沙劫波積骨逾於富羅飲乳過於溟渤於中竛竮之狀飃泊之苦有不可勝言者時而與獄種為伴也則惡逆為其本有間無間是其旅處時而與鬼趣為伴也則慳貪為其本曠野山澤是其旅處時而與畜類為伴也則愚癡為其本水陸空界是其旅處時而與修羅為伴也則瞋慢為其本須彌大海是其旅處時而與人道為伴也則綱常為其本四洲諸國是其旅處時而與欲天為伴也則戒善為本地居空居是其旅處時而與色無色界為伴也則禪定為其本四禪四空是其旅處方其旅也隨處而著不知其旅也嗟乎故鄉之夢尚自朧客次之居豈為究竟是非託安養以橫超悟寂光而上徹又孰能外乎旅義也哉天都汪潤生居士法名性淨別字旅三去家遊學有年矣晚居琴川有令嗣長於才夙柄家政故居士得不為家累雖厚棟華軒可以逸老以居士視之蕭然若寄也居士恒長齋事佛以淡泊無欲為養以操修問道為兢兢康熙乙卯歲仲秋之朔乃其七十揆辰諸親友故舊爭為文以祝之詩以頌之居士謝而弗視視亦不審曰徒周章乎耳目耳與其諛言之來以沽吾名孰若法言之及以裨吾心爰以旅三之字而請說於予予思居士既旅乎三界是得其旅之大者也豈天都琴邑云乎哉然吾竊觀夫居士之人族士類多操奇贏走四方其於旅也惟獲其利未盡其義也今居士旅於斯設有人焉告之以猗生煑海之謀進之以郭氏治山之䇿吾知居士必掩耳而去之矣獨茲七旬介壽之期乃能却朋樽而不顧置牲鼎而不御訪予於枯澹寂寞之濵咨予以異世乖俗之旨可謂真湻未散大樸猶存其幾于道者乎曰猶未也夫既曰旅三則一切法趣旅更無有法過於旅者所謂隨處而著不知其處理性旅也了此三界同為逆旅本業處伴各各差殊名字旅也知其非家不住不著於粗敝境不生貪戀觀行旅也客塵煩惱方便折伏悠悠旅夢彷彿欲醒相似旅也不離法界隨寄塵寰哀此旅人盡力津濟分證旅也是朽故宅屬於一人我常在此說法教化大火所燒時我此土安隱究竟旅也苟不達此義則於郵亭傳舍誤認家鄉諸所謀求無非火宅中事又或畏此旅途多諸苦難歸心孔亟去不還來將使六宇同昏四生奚賴若此者皆無當於旅義也然則居士之在今日惟當以安養為歸宿之地毋終為堪忍之旅客若夫華開見佛獲證真常又當睠此娑婆再來僑寓將護眾伴誘掖羣迷更於異域殊方分身應迹往來三界終不疲厭斯為究竟旅人庶不虗居士立字之意矣觀佛毫相法觀無量壽佛經云若欲生西方者當觀一丈六像在池水上又云身相眾多不可徧觀須從一相好入謂專觀白毫一相待觀成熟餘相自然顯現毫長一丈五尺周圍五寸外有八棱中則虗通彷彿如瑠璃筒在兩眉中間表中道也右旋宛轉白如珂雪瑩淨明徹顯暎金軀依此想時令心堅住心若昏散制令明靜葢明則不昏靜則不散當知明靜是止觀之效定慧之體亦即心之本體止觀是工夫定慧是因行明靜是功效明靜之極頓合本體若至果上即成福智二種莊嚴也今身心寂定止也觀佛毫相觀也毫相歷然明也堅住不動靜也所謂託彼身相熏我心性觀智若成自然顯現正此義耳然欲修此觀須了萬法唯心經云心如工畫師造種種五陰一切世間中莫不從心造故知彌陀毫相自是我心本具定中所現亦是我心造出是心作毫相是心是毫相不從他得不向外來如是了達方名如法修觀也總之能觀觀智為一心三觀所觀毫相是一境三諦何以故定中毫相雖現在前皆想念因緣無實性相此因緣所生之法法爾無自性無他性無共性無無因性四性皆空故無實性而此想念所生毫相非惟性空相亦巨得如鏡像水月故無實相也性相無實故即空即真隨念能見故即假即俗即假即俗故非真空即空即真故非俗假此則作是一念遮照同時離即離非是即非即故為三一圓融不可思議中道觀境也全諦發觀觀還照諦境觀不二唯是一心故古德頌云境為妙假觀為空境觀雙亡即是中亡照何曾有前後一心融絕了無蹤此頌影略須略釋其意言境為妙假則空與中在其中矣不具空中焉稱妙假言觀為空即妙空也而中與假在其中矣言境觀雙亡則雙照在其中矣雙亡即非空非假雙照是即空即假二邊不著亦復不離故即是中道而下二句即言亡照同時一心融絕也葢境雖具三既屬所觀之境但稱妙假觀雖具三既屬能觀之觀但名妙空境觀雖各具三既用雙亡雙照之妙觀冥合雙非雙即之妙境但是妙中由是舉一即三言三即一三一非同三三非異不可以意識思量不可以名言分別故曰亡照何曾有前後一心融絕了無蹤也境觀圓融妙理以四語總攝無遺透此妙伽陀勝讀台宗書數百卷然非明了一心淹貫台教者恐未易透也經云但聞白毫名字滅無量罪何況如法繫念釋迦如來金口垂示天台智者勸令專修近代唯幽谿大師常修此觀今淨業行人苟能一心持名往生可保兼修妙觀則託品必高利根上士胡不勉而行之
